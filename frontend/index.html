<!doctype html>
<html lang="en">

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://attachpro.com/" />
    <meta property="og:title" content="AttachPro - Match Students to Industry Placements Automatically" />

    <meta property="twitter:description" content="87% placement success • 3× faster matching • Trusted by leading universities" />
    <meta property="twitter:image" content="https://attachpro.com/twitter-image.jpg" />

    <!-- Performance & Accessibility -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Prevent layout shift -->
    <style>
      /* Critical CSS to prevent layout shift */
      body { margin: 0; font-family: system-ui, sans-serif; }
      .preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; }
    </style>
    
    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "AttachPro",
      "url": "https://attachpro.com",
      "logo": "https://attachpro.com/logo.png",
      "description": "AI-powered student placement platform for universities",
      "sameAs": [
        "https://twitter.com/attachpro",
        "https://linkedin.com/company/attachpro"
      ]
    }
    </script>
  </head>
